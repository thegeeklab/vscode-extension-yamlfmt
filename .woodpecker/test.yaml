---
when:
  - event: [pull_request, tag]
  - event: [push, manual]
    branch:
      - ${CI_REPO_DEFAULT_BRANCH}

steps:
  - name: test
    image: docker.io/library/node:lts
    commands:
      - apt-get update > /dev/null 2>&1 && apt-get install -yq dbus dbus-x11 libasound2 libgbm1 libgtk-3-0 libnss3 xvfb wget jq > /dev/null 2>&1
      - eval $$(dbus-launch --sh-syntax)
      - export DBUS_SYSTEM_BUS_ADDRESS=$$DBUS_SESSION_BUS_ADDRESS
      - wget -q https://github.com/google/yamlfmt/releases/download/v0.21.0/yamlfmt_0.21.0_Linux_x86_64.tar.gz -O /tmp/yamlfmt.tar.gz && tar -xzf /tmp/yamlfmt.tar.gz -C /tmp && mv /tmp/yamlfmt /usr/local/bin/ && chmod +x /usr/local/bin/yamlfmt
      - npm ci
      - xvfb-run -a npm run test

---
when:
  - event: [pull_request, tag]
  - event: [push, manual]
    branch:
      - ${CI_REPO_DEFAULT_BRANCH}

steps:
  - name: build
    image: docker.io/library/node:lts
    commands:
      - npm ci
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          npm version "${CI_COMMIT_TAG#v}" --no-git-tag-version
        else
          npm version "0.0.0-${CI_COMMIT_SHA:0:8}" --no-git-tag-version
        fi
      - npm run vscode:prepublish
      - npx vsce package --no-dependencies --no-git-tag-version

  - name: checksum
    image: quay.io/thegeeklab/alpine-tools
    commands:
      - sha256sum *.vsix > sha256sum.txt
      - cat sha256sum.txt

  - name: changelog
    image: quay.io/thegeeklab/git-sv
    commands:
      - git sv current-version
      - git sv release-notes -t ${CI_COMMIT_TAG:-next} -o CHANGELOG.md
      - cat CHANGELOG.md

  - name: publish-github
    image: docker.io/plugins/github-release
    settings:
      api_key:
        from_secret: github_token
      files:
        - "*.vsix"
        - sha256sum.txt
      note: CHANGELOG.md
      overwrite: true
      title: ${CI_COMMIT_TAG}
    when:
      - event: [tag]

  - name: publish-ovsx
    image: docker.io/library/node:lts
    environment:
      OVSX_TOKEN:
        from_secret: ovsx_token
    commands:
      - npx ovsx publish --no-dependencies --packagePath *.vsix -p $${OVSX_TOKEN}
    when:
      - event: [tag]

  - name: publish-marketplace
    image: docker.io/library/node:lts
    environment:
      MARKETPLACE_TOKEN:
        from_secret: marketplace_token
    commands:
      - npx vsce publish --no-dependencies --no-git-tag-version --packagePath *.vsix -p $${MARKETPLACE_TOKEN}
    when:
      - event: [tag]

depends_on:
  - static
  - test

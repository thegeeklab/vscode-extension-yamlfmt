---
when:
  - event: [pull_request, tag]
  - event: [push, manual]
    branch:
      - ${CI_REPO_DEFAULT_BRANCH}

steps:
  - name: deps
    image: docker.io/library/node:lts
    depends_on: []
    commands:
      - npm ci

  - name: markdownlint
    image: quay.io/thegeeklab/markdownlint-cli
    depends_on: []
    commands:
      - markdownlint 'README.md' 'CONTRIBUTING.md'

  - name: yamlfmt-lint
    image: ghcr.io/google/yamlfmt:latest
    depends_on: []
    commands:
      - yamlfmt -lint .

  - name: spellcheck
    image: ghcr.io/streetsidesoftware/cspell
    depends_on: []
    commands:
      - cspell-cli lint . --gitignore --color

  - name: link-validation
    image: docker.io/lycheeverse/lychee:0.23
    depends_on: []
    commands:
      - lychee --no-progress --format detailed README.md
    environment:
      GITHUB_TOKEN:
        from_secret: github_token_ro

  - name: check-format
    image: docker.io/library/node:lts
    depends_on: [deps]
    commands:
      - npm run format:check

  - name: check-types
    image: docker.io/library/node:lts
    depends_on: [deps]
    commands:
      - npm run check-types

  - name: lint
    image: docker.io/library/node:lts
    depends_on: [deps]
    commands:
      - npm run lint
